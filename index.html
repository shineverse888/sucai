<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>登录 — 闪趣互动 AI Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f5f6f8;
  --border:#e2e4e9;--border2:#c8cad2;
  --text:#1a1a24;--text2:#60626e;--text3:#9899a6;
  --acc:#e0a030;--acc2:#f5c55a;--r:14px;--rs:9px;
  --shadow:0 4px 24px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.05);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}

/* 背景装饰 */
.bg-glow{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.bg-glow::before{
  content:'';position:absolute;top:-10%;right:-5%;
  width:500px;height:500px;
  background:radial-gradient(ellipse,rgba(224,160,48,.12) 0%,transparent 65%);
  border-radius:50%;
}
.bg-glow::after{
  content:'';position:absolute;bottom:-10%;left:-5%;
  width:400px;height:400px;
  background:radial-gradient(ellipse,rgba(90,140,240,.08) 0%,transparent 65%);
  border-radius:50%;
}

/* 登录卡片 */
.card{
  position:relative;z-index:1;width:100%;max-width:400px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:40px 36px 34px;
  box-shadow:var(--shadow);
  animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* Logo */
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:32px}
.logo-img-wrap{height:44px;display:flex;align-items:center;justify-content:center}
.logo-img-wrap img{height:44px;width:auto;object-fit:contain}
.logo-fallback{display:flex;align-items:center;gap:9px}
.logo-icon{width:34px;height:34px}
.logo-text{font-size:20px;font-weight:800;letter-spacing:-.03em;color:var(--text)}
.logo-text span{color:var(--acc)}
.logo-sub{font-size:12px;color:var(--text3);letter-spacing:.04em;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:3px 12px;}

/* 分隔线 */
.divider{height:1px;background:var(--border);margin:0 -36px 28px;margin-top:0}

/* 表单 */
.form-group{margin-bottom:18px}
label{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.04em;margin-bottom:8px}
label .lbl-icon{width:14px;height:14px;opacity:.5}
input{
  width:100%;background:var(--bg3);
  border:1.5px solid var(--border);border-radius:var(--rs);
  padding:11px 14px;color:var(--text);font-size:14px;font-family:inherit;
  outline:none;transition:border-color .15s,box-shadow .15s,background .15s;
}
input::placeholder{color:var(--text3)}
input:focus{border-color:var(--acc);background:#fff;box-shadow:0 0 0 3px rgba(224,160,48,.12)}
input.error{border-color:#e05c5c;box-shadow:0 0 0 3px rgba(224,92,92,.1)}

/* 登录按钮 */
.btn{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--acc) 0%,var(--acc2) 100%);
  color:#fff;border:none;border-radius:var(--rs);
  font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;margin-top:6px;
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 2px 10px rgba(224,160,48,.3);
  letter-spacing:.04em;
}
.btn:hover{filter:brightness(1.06);box-shadow:0 4px 14px rgba(224,160,48,.4);transform:translateY(-1px)}
.btn:active{transform:scale(.98);filter:none}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;filter:none;box-shadow:none}

/* 错误提示 */
.err-msg{
  display:none;
  background:#fff5f5;border:1px solid #fecdcd;
  border-radius:var(--rs);padding:10px 14px;
  font-size:13px;color:#c0392b;
  margin-top:14px;text-align:center;
}
.err-msg.show{display:flex;align-items:center;justify-content:center;gap:6px;animation:fadeIn .2s ease}

/* 底部 */
.footer{margin-top:26px;text-align:center;font-size:12px;color:var(--text3);border-top:1px solid var(--border);padding-top:18px}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="card">
  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-img-wrap">
      <img id="logo-img" src="company-logo.png" alt="闪趣互动"
        onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex'">
      <div class="logo-fallback" id="logo-fb" style="display:none">
        <svg class="logo-icon" viewBox="0 0 34 34" fill="none">
          <rect width="34" height="34" rx="8" fill="#e0a030" fill-opacity=".12"/>
          <path d="M9 26V13l8-4 8 4v13M13 26v-8h8v8" stroke="#e0a030" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="17" cy="13" r="1.6" fill="#e0a030"/>
        </svg>
        <span class="logo-text">AI<span>Hub</span></span>
      </div>
    </div>
    <div class="logo-sub">闪趣互动 · 内部工具平台</div>
  </div>
  <div class="divider"></div>

  <!-- 表单 -->
  <form id="login-form" onsubmit="doLogin(event)" autocomplete="off">
    <div class="form-group">
      <label for="username">
        <svg class="lbl-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        用户名
      </label>
      <input type="text" id="username" name="username" placeholder="请输入用户名"
        autocomplete="username" autofocus spellcheck="false">
    </div>
    <div class="form-group">
      <label for="password">
        <svg class="lbl-icon" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        密码
      </label>
      <input type="password" id="password" name="password" placeholder="请输入密码"
        autocomplete="current-password">
    </div>
    <button class="btn" type="submit" id="login-btn">
      <span id="btn-text">登 录</span>
    </button>
    <div class="err-msg" id="err-msg">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v4M8 11v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span id="err-text"></span>
    </div>
  </form>

  <div class="footer">© 2025 闪趣互动 · 仅限内部使用</div>
</div>

<script>
// ── 常量 ──
const STORAGE_USERS = 'ah_users';
const STORAGE_SESSION = 'ah_session';
const DEFAULT_ADMIN = {
  id: 'admin_001',
  username: 'admin',
  password: 'admin123',
  role: 'admin',
  status: 'active'
};

// ── 初始化：如果没有用户数据，创建默认管理员 ──
function initUsers() {
  try {
    const raw = localStorage.getItem(STORAGE_USERS);
    if (!raw) {
      localStorage.setItem(STORAGE_USERS, JSON.stringify([DEFAULT_ADMIN]));
    }
  } catch(e) {}
}

// ── 如果已登录，直接跳转 ──
function checkAlreadyLoggedIn() {
  try {
    const s = localStorage.getItem(STORAGE_SESSION);
    if (s) {
      const session = JSON.parse(s);
      if (session && session.id && session.username) {
        location.replace('ai-hub.html');
        return true;
      }
    }
  } catch(e) {}
  return false;
}

// ── 显示错误 ──
function showErr(msg) {
  const el = document.getElementById('err-msg');
  const txt = document.getElementById('err-text');
  if (txt) txt.textContent = msg;
  else el.textContent = msg;
  el.classList.add('show');
  document.getElementById('username').classList.toggle('error', msg.includes('用户名'));
  document.getElementById('password').classList.toggle('error', msg.includes('密码'));
}
function clearErr() {
  const el = document.getElementById('err-msg');
  el.classList.remove('show');
  document.getElementById('username').classList.remove('error');
  document.getElementById('password').classList.remove('error');
}

// ── 登录逻辑 ──
function doLogin(e) {
  e.preventDefault();
  clearErr();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username) { showErr('请输入用户名'); return; }
  if (!password)  { showErr('请输入密码');   return; }

  const btn = document.getElementById('login-btn');
  const btnText = document.getElementById('btn-text');
  btn.disabled = true;
  btnText.textContent = '验证中...';

  // 模拟短暂延迟，防止暴力枚举
  setTimeout(() => {
    try {
      const raw = localStorage.getItem(STORAGE_USERS);
      const users = raw ? JSON.parse(raw) : [DEFAULT_ADMIN];
      const user = users.find(u => u.username === username && u.password === password && u.status === 'active');

      if (!user) {
        showErr('用户名或密码错误');
        btn.disabled = false;
        btnText.textContent = '登 录';
        // 密码框清空，聚焦
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        return;
      }

      // 登录成功 —— 保存会话（不含密码）
      const session = { id: user.id, username: user.username, role: user.role, loginAt: Date.now() };
      localStorage.setItem(STORAGE_SESSION, JSON.stringify(session));
      // 兼容旧字段名
      localStorage.setItem('currentUser', JSON.stringify(session));

      btnText.textContent = '登录成功 ✓';
      btn.style.background = '#5ec470';
      setTimeout(() => { location.replace('ai-hub.html'); }, 300);

    } catch(err) {
      showErr('登录异常，请刷新重试');
      btn.disabled = false;
      btnText.textContent = '登 录';
    }
  }, 400);
}

// ── 回车自动聚焦密码框 ──
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('password').focus(); }
});

// ── 输入时清除错误 ──
['username','password'].forEach(id => {
  document.getElementById(id).addEventListener('input', clearErr);
});

// ── 启动 ──
initUsers();
checkAlreadyLoggedIn();
</script>
</body>
</html>
